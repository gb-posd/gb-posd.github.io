<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYS_STATUS // OPERATIONAL GRID</title>
  <style>
    /* ── Base ────────────────────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=VT323&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Backgrounds */
      --bg-900: #0d0a0d;
      --bg-800: #12101a;
      --bg-700: #191a1e;
      --bg-600: #1e181e;
      /* Red accent */
      --red-500: #e8615a;
      --red-400: #ea6f69;
      --red-300: #f4908b;
      --red-700: #9c3230;
      --red-800: #5e2122;
      --red-900: #3c181a;
      /* Cyan accent */
      --cyan-500: #2be4ea;
      --cyan-400: #5eeef3;
      --cyan-900: #0d3336;
      /* Status */
      --green-500: #2bfea0;
      --green-900: #0b2e1e;
      --yellow-500: #fed33f;
      --gray-500:   #6b7a8d;
      /* Glows */
      --glow-red:   0 0 8px var(--red-500), 0 0 20px rgba(232,97,90,0.3);
      --glow-cyan:  0 0 8px var(--cyan-500), 0 0 20px rgba(43,228,234,0.3);
      --glow-green: 0 0 8px var(--green-500), 0 0 20px rgba(43,254,160,0.3);
      /* Notched-corner clip-path */
      --notch: 0.65rem;
      --notch-path: polygon(0 0, 100% 0, 100% calc(100% - var(--notch)), calc(100% - var(--notch)) 100%, 0 100%);
      /* Legacy aliases so JS-generated HTML keeps working */
      --cyan:    var(--cyan-500);
      --magenta: var(--red-500);
      --green:   var(--green-500);
      --yellow:  var(--yellow-500);
      --red:     var(--red-500);
      --gray:    var(--gray-500);
      --bg:      var(--bg-800);
      --bg2:     var(--bg-600);
      --bg3:     var(--bg-700);
      --border:  var(--red-800);
      --text:    var(--red-400);
      --dim:     var(--red-700);
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background-color: var(--bg-800);
      background-image:
        radial-gradient(ellipse at 20% 0%,   rgba(60,24,26,0.6)  0%, transparent 55%),
        radial-gradient(ellipse at 80% 100%, rgba(13,51,54,0.4)  0%, transparent 50%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      color: var(--red-400);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-900); }
    ::-webkit-scrollbar-thumb { background: var(--red-800); }

    /* ── Layout ─────────────────────────────────────────── */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }

    /* ── Header ─────────────────────────────────────────── */
    .site-header {
      text-align: center;
      padding: 36px 0 28px;
      border-bottom: 2px solid var(--red-500);
      box-shadow: 0 3px 20px rgba(232,97,90,0.2);
      margin-bottom: 0;
    }

    .header-eyebrow {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.3em;
      color: var(--cyan-500);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .header-title {
      font-family: 'VT323', monospace;
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--red-500);
      text-shadow: var(--glow-red);
      line-height: 1;
    }

    .header-title span {
      color: var(--cyan-500);
      text-shadow: var(--glow-cyan);
    }

    .header-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      color: var(--red-700);
      letter-spacing: 0.25em;
      margin-top: 10px;
      text-transform: uppercase;
    }

    /* ── CVE Ticker (desktop only) ───────────────────────── */
    .cve-ticker-bar {
      display: flex;
      align-items: center;
      overflow: hidden;
      border-bottom: 1px solid var(--red-800);
      background: var(--bg-900);
      height: 40px;
      margin-bottom: 28px;
    }

    .cve-ticker-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      color: var(--red-500);
      text-shadow: var(--glow-red);
      background: var(--red-900);
      border-right: 2px solid var(--red-500);
      padding: 0 14px;
      height: 100%;
      display: flex;
      align-items: center;
      white-space: nowrap;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .cve-ticker-viewport {
      flex: 1;
      overflow: hidden;
      height: 100%;
      position: relative;
    }

    .cve-ticker-track {
      display: inline-flex;
      align-items: center;
      height: 100%;
      white-space: nowrap;
      animation: ticker-scroll var(--ticker-duration, 70s) linear infinite;
      will-change: transform;
    }

    .cve-ticker-track:hover { animation-play-state: paused; }

    @keyframes ticker-scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .cve-ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      height: 100%;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
      flex-shrink: 0;
      border-right: 1px solid var(--red-900);
    }

    .cve-ticker-item:hover { background: rgba(232,97,90,0.06); }

    .cve-ticker-id {
      font-family: 'VT323', monospace;
      font-size: 1.05rem;
      color: var(--cyan-500);
      text-shadow: var(--glow-cyan);
      letter-spacing: 0.05em;
    }

    .cve-ticker-desc {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--red-400);
      max-width: 360px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cve-ticker-sep {
      color: var(--red-800);
      font-size: 0.55rem;
      padding: 0 6px;
      flex-shrink: 0;
    }

    .cve-ticker-loading {
      padding: 0 20px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--red-700);
      letter-spacing: 0.15em;
    }

    @media (max-width: 900px) {
      .cve-ticker-bar { display: flex; }
      .cve-ticker-desc { max-width: 200px; }
    }

    /* ── Banner card (toggle block) ─────────────────────── */
    .banner-card {
      background: var(--bg-600);
      border: 1px solid var(--red-800);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s;
      cursor: pointer;
      clip-path: var(--notch-path);
    }

    /* Notch accent line */
    .banner-card::after {
      content: '';
      position: absolute;
      bottom: calc(var(--notch) - 1px);
      right: -4px;
      width: calc(var(--notch) * 1.42);
      height: 2px;
      transform: rotate(-45deg);
    }

    .banner-card.ok::after   { background: var(--green-500); }
    .banner-card.warn::after { background: var(--red-500); }

    /* Left accent stripe */
    .banner-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
    }

    .banner-card.ok::before   { background: var(--green-500); box-shadow: var(--glow-green); }
    .banner-card.warn::before { background: var(--red-500);   box-shadow: var(--glow-red); }

    .banner-card.ok   { border-color: rgba(43,254,160,0.3); }
    .banner-card.warn { border-color: rgba(232,97,90,0.5); animation: pulse-border 1.5s ease-in-out infinite; }

    @keyframes pulse-border {
      0%, 100% { border-color: rgba(232,97,90,0.3); }
      50%       { border-color: rgba(232,97,90,0.75); }
    }

    .banner-card:hover     { box-shadow: 0 0 20px rgba(232,97,90,0.15); }
    .banner-card.ok:hover  { box-shadow: 0 0 20px rgba(43,254,160,0.15); }

    .banner-icon { font-size: 1.6rem; line-height: 1; flex-shrink: 0; }

    .banner-info { flex: 1; min-width: 0; }

    .banner-source {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      color: var(--red-700);
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .banner-msg {
      font-family: 'VT323', monospace;
      font-size: 1.4rem;
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .banner-card.ok   .banner-msg { color: var(--green-500); text-shadow: var(--glow-green); }
    .banner-card.warn .banner-msg { color: var(--red-300);   text-shadow: var(--glow-red); }

    .banner-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      padding: 3px 8px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .badge-ok   { background: rgba(43,254,160,0.1);  color: var(--green-500); border: 1px solid rgba(43,254,160,0.4); }
    .badge-warn { background: rgba(232,97,90,0.1);   color: var(--red-400);   border: 1px solid rgba(232,97,90,0.4); }

    .toggle-caret {
      font-size: 0.65rem;
      color: var(--red-700);
      flex-shrink: 0;
      margin-left: 6px;
      transition: transform 0.3s ease;
      display: inline-block;
    }

    .toggle-caret.open { transform: rotate(90deg); }

    @media (max-width: 900px) {
      .toggle-caret { display: none; }
    }

    /* ── Section heading ────────────────────────────────── */
    .section-label {
      font-family: 'VT323', monospace;
      font-size: 1.6rem;
      letter-spacing: 0.06em;
      color: var(--red-500);
      text-shadow: var(--glow-red);
      text-transform: uppercase;
      display: block;
      padding-bottom: 0.35rem;
      margin-bottom: 14px;
      border-bottom: 2px solid var(--red-500);
      box-shadow: 0 2px 14px rgba(232,97,90,0.18);
    }

    /* ── Card grid ──────────────────────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .main-grid .card-grid {
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    }

    .card {
      background: var(--bg-600);
      border: 1px solid var(--red-800);
      overflow: hidden;
      transition: border-color 0.25s, box-shadow 0.25s;
      clip-path: var(--notch-path);
      position: relative;
    }

    .card::after {
      content: '';
      position: absolute;
      bottom: calc(var(--notch) - 1px);
      right: -4px;
      width: calc(var(--notch) * 1.42);
      height: 1px;
      background: var(--red-800);
      transform: rotate(-45deg);
      transition: background 0.25s;
    }

    .card:hover { border-color: var(--red-700); box-shadow: 0 0 18px rgba(232,97,90,0.1); }
    .card:hover::after { background: var(--red-700); }

    .card-header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--red-900);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      background: var(--bg-700);
    }

    .card-name {
      font-family: 'VT323', monospace;
      font-size: 1.15rem;
      letter-spacing: 0.04em;
      color: var(--red-300);
      text-transform: uppercase;
      line-height: 1.2;
    }

    .status-pill {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      padding: 2px 7px;
      white-space: nowrap;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .pill-operational  { background: rgba(43,254,160,0.1);   color: var(--green-500); border: 1px solid rgba(43,254,160,0.35); }
    .pill-degraded     { background: rgba(254,211,63,0.1);   color: var(--yellow-500); border: 1px solid rgba(254,211,63,0.35); }
    .pill-partial      { background: rgba(254,211,63,0.1);   color: var(--yellow-500); border: 1px solid rgba(254,211,63,0.35); }
    .pill-major        { background: rgba(232,97,90,0.1);    color: var(--red-400);    border: 1px solid rgba(232,97,90,0.35); }
    .pill-unknown      { background: rgba(107,122,141,0.15); color: var(--gray-500);  border: 1px solid rgba(107,122,141,0.3); }

    .card-children { padding: 6px 0; }

    .child-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 14px;
      border-bottom: 1px solid rgba(94,33,34,0.4);
      transition: background 0.15s;
    }

    .child-row:last-child { border-bottom: none; }
    .child-row:hover { background: rgba(232,97,90,0.04); }

    .child-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-right: 10px;
    }

    .dot-operational { background: var(--green-500);  box-shadow: var(--glow-green); }
    .dot-degraded    { background: var(--yellow-500); box-shadow: 0 0 6px var(--yellow-500); }
    .dot-partial     { background: var(--yellow-500); box-shadow: 0 0 6px var(--yellow-500); }
    .dot-major       { background: var(--red-500);    box-shadow: var(--glow-red); animation: blink 1s step-start infinite; }
    .dot-unknown     { background: var(--gray-500); }

    @keyframes blink { 50% { opacity: 0; } }

    .child-name {
      flex: 1;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--red-400);
      display: flex;
      align-items: center;
    }

    .child-status {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.05em;
    }

    .status-operational { color: var(--green-500); }
    .status-degraded    { color: var(--yellow-500); }
    .status-partial     { color: var(--yellow-500); }
    .status-major       { color: var(--red-400); }
    .status-unknown     { color: var(--gray-500); }

    /* ── Azure Incidents ────────────────────────────────── */
    .incident-card {
      background: var(--bg-600);
      border: 1px solid rgba(232,97,90,0.4);
      margin-bottom: 12px;
      overflow: hidden;
      clip-path: var(--notch-path);
      position: relative;
      animation: pulse-border 2s ease-in-out infinite;
    }

    .incident-card::after {
      content: '';
      position: absolute;
      bottom: calc(var(--notch) - 1px);
      right: -4px;
      width: calc(var(--notch) * 1.42);
      height: 1px;
      background: var(--red-700);
      transform: rotate(-45deg);
    }

    .incident-header {
      background: rgba(232,97,90,0.07);
      border-bottom: 1px solid rgba(232,97,90,0.2);
      padding: 11px 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .incident-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: var(--red-400);
      background: rgba(232,97,90,0.12);
      border: 1px solid rgba(232,97,90,0.4);
      padding: 3px 7px;
      flex-shrink: 0;
      margin-top: 2px;
      text-transform: uppercase;
    }

    .incident-title {
      font-family: 'VT323', monospace;
      font-size: 1.2rem;
      color: var(--red-300);
      line-height: 1.3;
      letter-spacing: 0.02em;
    }

    .incident-meta {
      padding: 9px 14px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--red-900);
    }

    .meta-item { font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; color: var(--red-700); }
    .meta-item span { color: var(--red-400); }

    .incident-desc {
      padding: 11px 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.74rem;
      color: var(--red-400);
      line-height: 1.65;
      white-space: pre-wrap;
      opacity: 0.85;
      max-height: 200px;
      overflow-y: auto;
    }

    .incident-desc::-webkit-scrollbar { width: 3px; }
    .incident-desc::-webkit-scrollbar-track { background: var(--bg-900); }
    .incident-desc::-webkit-scrollbar-thumb { background: var(--red-800); }

    .incident-link {
      display: inline-block;
      padding: 9px 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      color: var(--cyan-500);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: text-shadow 0.2s;
    }

    .incident-link:hover { text-shadow: var(--glow-cyan); }

    .no-incidents {
      text-align: center;
      padding: 32px 16px;
      color: var(--green-500);
      font-family: 'VT323', monospace;
      font-size: 1.5rem;
      letter-spacing: 0.08em;
      text-shadow: var(--glow-green);
      border: 1px solid rgba(43,254,160,0.2);
      background: rgba(43,254,160,0.03);
      clip-path: var(--notch-path);
    }

    /* ── Loader ─────────────────────────────────────────── */
    .loader {
      text-align: center;
      padding: 40px;
      color: var(--red-700);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
    }

    .loader-ring {
      display: inline-block;
      width: 30px; height: 30px;
      border: 2px solid var(--red-900);
      border-top-color: var(--red-500);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ─────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 20px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--red-700);
      letter-spacing: 0.15em;
      border-top: 1px solid var(--red-900);
      background: var(--bg-900);
      margin: 0 -20px -48px;
    }

    .refresh-btn {
      background: transparent;
      border: 1px solid var(--red-500);
      color: var(--red-400);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      padding: 6px 16px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      text-transform: uppercase;
      margin-top: 10px;
    }

    .refresh-btn:hover {
      background: rgba(232,97,90,0.1);
      box-shadow: var(--glow-red);
    }

    /* ── CVE Feed (mobile list) ─────────────────────────── */
    .cve-list { margin-bottom: 0; }

    .cve-item {
      background: var(--bg-600);
      border: 1px solid var(--red-800);
      margin-bottom: 8px;
      overflow: hidden;
      display: flex;
      align-items: stretch;
      clip-path: var(--notch-path);
      position: relative;
      text-decoration: none;
      transition: border-color 0.2s;
    }

    .cve-item::after {
      content: '';
      position: absolute;
      bottom: calc(var(--notch) - 1px);
      right: -4px;
      width: calc(var(--notch) * 1.42);
      height: 1px;
      background: var(--red-800);
      transform: rotate(-45deg);
    }

    .cve-item:hover { border-color: var(--red-700); }

    .cve-severity-bar { width: 4px; flex-shrink: 0; }

    .sev-critical { background: var(--red-500);    box-shadow: var(--glow-red); }
    .sev-high     { background: #ff6b35;            box-shadow: 0 0 8px #ff6b35; }
    .sev-medium   { background: var(--yellow-500);  box-shadow: 0 0 8px var(--yellow-500); }
    .sev-low      { background: var(--green-500);   box-shadow: var(--glow-green); }
    .sev-none     { background: var(--gray-500); }

    .cve-body {
      flex: 1;
      padding: 9px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }

    .cve-id {
      font-family: 'VT323', monospace;
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      color: var(--cyan-500);
      text-shadow: var(--glow-cyan);
    }

    .cve-desc {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--red-400);
      line-height: 1.45;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .cve-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .cve-score {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      padding: 1px 6px;
    }

    .score-critical { color: var(--red-400);    border: 1px solid rgba(232,97,90,0.5);  background: rgba(232,97,90,0.1); }
    .score-high     { color: #ff6b35;            border: 1px solid rgba(255,107,53,0.5); background: rgba(255,107,53,0.1); }
    .score-medium   { color: var(--yellow-500); border: 1px solid rgba(254,211,63,0.5); background: rgba(254,211,63,0.1); }
    .score-low      { color: var(--green-500);  border: 1px solid rgba(43,254,160,0.4); background: rgba(43,254,160,0.07); }
    .score-none     { color: var(--gray-500);   border: 1px solid rgba(107,122,141,0.4); background: rgba(107,122,141,0.1); }

    .cve-date {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      color: var(--red-700);
      letter-spacing: 0.04em;
    }

    /* ── Desktop main layout ────────────────────────────── */
    .main-grid {
      display: grid;
      gap: 20px;
      align-items: start;
      margin-bottom: 36px;
    }

    /* Desktop: left half only (status blocks) */
    @media (min-width: 901px) {
      .main-grid {
        grid-template-columns: 1fr 1fr;
      }
      /* CVE column is hidden on desktop (ticker used instead) */
      .col-cve { display: none; }
      /* Right grid column left intentionally empty */
    }

    /* Mobile: single column */
    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
      .col-left-status { order: 1; }
      .col-cve         { display: none; }
      .col-terminal    { display: flex; flex-direction: column; order: 2; }
    }

    .col { min-width: 0; }

    /* ── Left status column ──────────────────────────────── */
    .col-left-status {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Collapsible subsection ─────────────────────────── */
    .status-subsection {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.45s ease, padding-top 0.3s ease;
      padding-top: 0;
    }

    .status-subsection.open {
      max-height: 4000px;
      padding-top: 10px;
    }

    /* On mobile, always show subsections */
    @media (max-width: 900px) {
      .status-subsection {
        max-height: none !important;
        overflow: visible !important;
        padding-top: 10px !important;
      }
    }

    /* ── Terminal Panel ─────────────────────────────────── */
    .col-terminal { display: none; }

    @media (min-width: 901px) {
      .col-terminal {
        display: flex;
        flex-direction: column;
      }
    }

    .terminal-panel {
      background: #000;
      border: 1px solid #1a2a1a;
      border-top: 2px solid #00cc00;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 20px;
      max-height: calc(100vh - 140px);
      box-shadow: 0 0 24px rgba(0,204,0,0.08), inset 0 0 80px rgba(0,0,0,0.6);
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    .terminal-titlebar {
      background: #050f05;
      border-bottom: 1px solid #0f1f0f;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .terminal-title-text {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      color: #00cc00;
      text-shadow: 0 0 8px rgba(0,204,0,0.6);
      text-transform: uppercase;
    }

    .terminal-dots { display: flex; gap: 5px; align-items: center; }
    .tdot { width: 9px; height: 9px; border-radius: 50%; }
    .tdot-r { background: #ff5f56; }
    .tdot-y { background: #ffbd2e; }
    .tdot-g { background: #27c93f; }

    .terminal-output {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      color: #00cc00;
      font-size: 0.76rem;
      line-height: 1.65;
      min-height: 0;
      position: relative;
      z-index: 1;
    }

    .terminal-output::-webkit-scrollbar { width: 3px; }
    .terminal-output::-webkit-scrollbar-track { background: #000; }
    .terminal-output::-webkit-scrollbar-thumb { background: #0a3a0a; }

    .terminal-line {
      display: block;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .terminal-line.cmd    { color: #00cc00; }
    .terminal-line.out    { color: #888; }
    .terminal-line.err    { color: #ff4444; }
    .terminal-line.info   { color: #2be4ea; }
    .terminal-line.warn   { color: #fed33f; }
    .terminal-line.ok     { color: #2bfea0; }
    .terminal-line.header { color: #2be4ea; }
    .terminal-line.empty  { height: 0.75em; display: block; }

    .terminal-prompt-prefix { color: #00cc00; text-shadow: 0 0 5px rgba(0,204,0,0.5); }

    .terminal-input-row {
      display: flex;
      align-items: center;
      padding: 8px 14px 10px;
      border-top: 1px solid #0f2a0f;
      gap: 6px;
      flex-shrink: 0;
      background: #000;
      position: relative;
      z-index: 1;
    }

    .terminal-prompt {
      font-size: 0.76rem;
      color: #00cc00;
      text-shadow: 0 0 5px rgba(0,204,0,0.5);
      white-space: nowrap;
      flex-shrink: 0;
      font-family: 'Share Tech Mono', monospace;
    }

    .terminal-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #00cc00;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.76rem;
      caret-color: #00cc00;
      text-shadow: 0 0 4px rgba(0,204,0,0.4);
    }

    /* Scanlines overlay */
    .terminal-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.05) 2px,
        rgba(0,0,0,0.05) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    @media (max-width: 900px) {
      .terminal-panel {
        position: static;
        max-height: 320px;
      }
    }

    /* ── Glitch on title ────────────────────────────────── */
    .glitch { position: relative; display: inline-block; }

    .glitch::before, .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .glitch::before {
      color: var(--cyan-500);
      animation: glitch 4s step-start infinite;
      animation-delay: 0.5s;
    }

    .glitch::after {
      color: var(--red-700);
      animation: glitch 4s step-start infinite;
      animation-delay: 1.1s;
    }

    @keyframes glitch {
      0%,93%,100% { clip-path: polygon(0 0,0 0,0 0,0 0); transform: translateX(0); }
      94% { clip-path: polygon(0 20%,100% 20%,100% 45%,0 45%); transform: translateX(-3px); }
      96% { clip-path: polygon(0 60%,100% 60%,100% 80%,0 80%); transform: translateX(3px); }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header class="site-header">
    <div class="header-eyebrow">// LIVE FEED · OPERATIONAL INTELLIGENCE //</div>
    <h1 class="header-title">
      <span class="glitch" data-text="SYS">SYS</span>_STATUS
      <span>&nbsp;//&nbsp;</span>
      <span class="glitch" data-text="GRID">GRID</span>
    </h1>
    <div class="header-sub">SAMANAGE &amp; MICROSOFT AZURE · STATUS MONITOR</div>
  </header>

  <!-- CVE Ticker Tape (desktop only) -->
  <div class="cve-ticker-bar" id="cve-ticker-bar">
    <span class="cve-ticker-label">// CVE FEED</span>
    <div class="cve-ticker-viewport">
      <div class="cve-ticker-track" id="cve-ticker-track">
        <span class="cve-ticker-loading">SCANNING NVD CVE FEED...</span>
      </div>
    </div>
  </div>

  <!-- Main grid: left half = Azure + Samanage / mobile = also CVE column -->
  <div class="main-grid">

    <!-- Left half: Azure (top) then Samanage (below), each collapsible on desktop -->
    <div class="col col-left-status">

      <!-- Azure block -->
      <div class="status-block" id="azure-block">
        <div id="azure-banner-wrap">
          <div class="loader"><div class="loader-ring"></div><br>SCANNING AZURE...</div>
        </div>
        <div class="status-subsection" id="azure-section"></div>
      </div>

      <!-- Samanage block -->
      <div class="status-block" id="samanage-block">
        <div id="samanage-banner-wrap">
          <div class="loader"><div class="loader-ring"></div><br>SCANNING SAMANAGE...</div>
        </div>
        <div class="status-subsection" id="samanage-section"></div>
      </div>

    </div>

    <!-- CVE column — mobile only (desktop uses ticker) -->
    <div class="col col-cve" id="cve-section">
      <div class="loader"><div class="loader-ring"></div><br>SCANNING NVD CVE FEED...</div>
    </div>

    <!-- Terminal column — desktop right side -->
    <div class="col col-terminal">
      <div class="terminal-panel" id="terminal-panel">
        <div class="terminal-titlebar">
          <span class="terminal-title-text">// CMD TERMINAL</span>
          <div class="terminal-dots">
            <span class="tdot tdot-r"></span>
            <span class="tdot tdot-y"></span>
            <span class="tdot tdot-g"></span>
          </div>
        </div>
        <div class="terminal-output" id="terminal-output"></div>
        <div class="terminal-input-row">
          <span class="terminal-prompt">C:\SYS_STATUS&gt;</span>
          <input type="text" class="terminal-input" id="terminal-input" autocomplete="off" spellcheck="false" />
        </div>
      </div>
    </div>

  </div>

  <footer>
    <div id="last-updated">AWAITING DATA...</div>
    <div id="countdown" style="margin-top:6px;font-size:0.6rem;letter-spacing:0.2em;color:var(--dim)">NEXT REFRESH IN <span id="countdown-val" style="color:var(--cyan-500)">600</span>s</div>
    <br>
    <button class="refresh-btn" onclick="loadAll()">⟳ &nbsp;REFRESH</button>
  </footer>

</div>

<script>
  // ── Global data cache (used by terminal status command) ──
  let lastAzureXml      = null;
  let lastSamanageJson  = null;

  // ── Helpers ─────────────────────────────────────────────
  const CORS_PROXIES = [
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => `https://thingproxy.freeboard.io/fetch/${url}`,
  ];
  const SAMANAGE_URL = 'https://status.samanage.com/api/v2/summary.json';
  const AZURE_URL    = 'https://rssfeed.azure.status.microsoft/en-us/status/feed/';

  function pillClass(status = '') {
    if (status.includes('operational'))         return 'pill-operational';
    if (status.includes('degraded'))            return 'pill-degraded';
    if (status.includes('partial'))             return 'pill-partial';
    if (status.includes('major'))               return 'pill-major';
    return 'pill-unknown';
  }

  function dotClass(status = '') {
    if (status.includes('operational')) return 'dot-operational';
    if (status.includes('degraded'))    return 'dot-degraded';
    if (status.includes('partial'))     return 'dot-partial';
    if (status.includes('major'))       return 'dot-major';
    return 'dot-unknown';
  }

  function statusTextClass(status = '') {
    if (status.includes('operational')) return 'status-operational';
    if (status.includes('degraded'))    return 'status-degraded';
    if (status.includes('partial'))     return 'status-partial';
    if (status.includes('major'))       return 'status-major';
    return 'status-unknown';
  }

  function fmtStatus(s = '') {
    return s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  function stripHtml(html = '') {
    return html
      .replace(/<br\s*\/?>/gi, '\n')
      .replace(/<\/p>/gi, '\n')
      .replace(/<[^>]+>/g, '')
      .replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&')
      .replace(/&nbsp;/g, ' ').replace(/&#\d+;/g, '')
      .replace(/\n{3,}/g, '\n\n')
      .trim();
  }

  // ── Toggle collapsible subsections ───────────────────────
  function toggleSection(id) {
    const subsection = document.getElementById(id + '-section');
    const caret = document.querySelector('#' + id + '-banner-wrap .toggle-caret');
    if (!subsection) return;
    const isOpen = subsection.classList.contains('open');
    subsection.classList.toggle('open', !isOpen);
    if (caret) caret.classList.toggle('open', !isOpen);
  }

  // ── Samanage ─────────────────────────────────────────────
  async function fetchSamanage() {
    const r = await fetch(SAMANAGE_URL);
    return r.json();
  }

  function renderSamanage(data) {
    const indicator = data.status.indicator;
    const desc      = data.status.description;
    const isOk      = indicator === 'none';

    const bannerHTML = `
      <div class="banner-card ${isOk ? 'ok' : 'warn'}" onclick="toggleSection('samanage')" role="button" tabindex="0"
           onkeydown="if(event.key==='Enter'||event.key===' ')toggleSection('samanage')">
        <div class="banner-icon">${isOk ? '✦' : '⚠'}</div>
        <div class="banner-info">
          <div class="banner-source">Samanage · SolarWinds Service Desk</div>
          <div class="banner-msg">${isOk ? 'All Systems Operational' : desc}</div>
        </div>
        <span class="banner-badge ${isOk ? 'badge-ok' : 'badge-warn'}">${isOk ? 'OK' : 'ISSUE'}</span>
        <span class="toggle-caret">&#9654;</span>
      </div>`;

    const components = data.components;
    const groups   = components.filter(c => c.group === true);
    const children = components.filter(c => c.group === false && c.group_id);
    const standalone = components.filter(c => c.group === false && !c.group_id);

    const targetStandalone = ['Website & Blog'];
    const targetGroups = [
      'SolarWinds Service Desk [USA]',
      'SolarWinds Service Desk [EMEA]',
      'SolarWinds Service Desk [APAC]',
      'Mobile Application'
    ];

    function renderCard(name, status, kids = []) {
      const kidsHTML = kids.map(k => `
        <div class="child-row">
          <span class="child-name">
            <span class="child-dot ${dotClass(k.status)}"></span>
            ${k.name}
          </span>
          <span class="child-status ${statusTextClass(k.status)}">${fmtStatus(k.status)}</span>
        </div>`).join('');

      return `
        <div class="card">
          <div class="card-header">
            <div class="card-name">${name}</div>
            <span class="status-pill ${pillClass(status)}">${fmtStatus(status)}</span>
          </div>
          ${kids.length ? `<div class="card-children">${kidsHTML}</div>` : ''}
        </div>`;
    }

    let cards = '';

    for (const name of targetStandalone) {
      const c = standalone.find(x => x.name === name);
      if (c) cards += renderCard(c.name, c.status);
    }

    for (const name of targetGroups) {
      const g = groups.find(x => x.name === name);
      if (g) {
        const kids = children.filter(x => x.group_id === g.id);
        cards += renderCard(g.name, g.status, kids);
      }
    }

    const section = `
      <div class="section-label">// SAMANAGE · SOLARWINDS SERVICE DESK</div>
      <div class="card-grid">${cards}</div>`;

    return { bannerHTML, section };
  }

  // ── Azure RSS ─────────────────────────────────────────────
  async function fetchAzure() {
    let lastErr;
    for (const proxy of CORS_PROXIES) {
      try {
        const r = await fetch(proxy(AZURE_URL), { signal: AbortSignal.timeout(8000) });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const txt = await r.text();
        const parser = new DOMParser();
        const xml = parser.parseFromString(txt, 'text/xml');
        if (xml.querySelector('parseerror')) throw new Error('XML parse error');
        if (xml.getElementsByTagName('item').length === 0 &&
            xml.getElementsByTagName('channel').length === 0) throw new Error('Empty feed');
        return xml;
      } catch (e) {
        lastErr = e;
        console.warn(`Azure proxy failed (${proxy(AZURE_URL).split('?')[0]}):`, e.message);
      }
    }
    throw lastErr;
  }

  function renderAzure(xml) {
    const items = Array.from(xml.getElementsByTagName('item'));
    const active = items.filter(i => {
      const titleEl = i.getElementsByTagName('title')[0];
      const t = titleEl ? (titleEl.textContent || titleEl.innerHTML || '') : '';
      return /^active/i.test(t.trim());
    });
    const isNormal = active.length === 0;

    const bannerHTML = `
      <div class="banner-card ${isNormal ? 'ok' : 'warn'}" onclick="toggleSection('azure')" role="button" tabindex="0"
           onkeydown="if(event.key==='Enter'||event.key===' ')toggleSection('azure')">
        <div class="banner-icon">${isNormal ? '✦' : '⚠'}</div>
        <div class="banner-info">
          <div class="banner-source">Microsoft Azure</div>
          <div class="banner-msg">${isNormal ? 'All Systems Normal' : `${active.length} Active Incident${active.length > 1 ? 's' : ''}`}</div>
        </div>
        <span class="banner-badge ${isNormal ? 'badge-ok' : 'badge-warn'}">${isNormal ? 'OK' : 'ALERT'}</span>
        <span class="toggle-caret">&#9654;</span>
      </div>`;

    let incidentsHTML = '';
    if (isNormal) {
      incidentsHTML = `<div class="no-incidents">✦ &nbsp;NO ACTIVE INCIDENTS DETECTED &nbsp;✦</div>`;
    } else {
      incidentsHTML = active.map(item => {
        const title   = item.getElementsByTagName('title')[0]?.textContent || '';
        const link    = item.getElementsByTagName('link')[0]?.textContent?.trim() || '#';
        const pubDate = item.getElementsByTagName('pubDate')[0]?.textContent || '';
        const desc    = stripHtml(item.getElementsByTagName('description')[0]?.textContent || '');
        const date    = pubDate ? new Date(pubDate).toLocaleString() : 'Unknown';

        return `
          <div class="incident-card">
            <div class="incident-header">
              <span class="incident-tag">ACTIVE</span>
              <div class="incident-title">${title.replace(/^Active\s*[–-]\s*/i, '')}</div>
            </div>
            <div class="incident-meta">
              <div class="meta-item">Published: <span>${date}</span></div>
            </div>
            <div class="incident-desc">${desc}</div>
            <a class="incident-link" href="${link}" target="_blank" rel="noopener">
              ↗ VIEW INCIDENT REPORT
            </a>
          </div>`;
      }).join('');
    }

    const section = `
      <div class="section-label">// MICROSOFT AZURE · INCIDENT FEED</div>
      ${incidentsHTML}`;

    return { bannerHTML, section };
  }

  // ── CVE Feed (NVD) ────────────────────────────────────────
  const CVE_KEYWORDS = [
    'microsoft', 'windows', 'azure', 'office', 'outlook', 'exchange',
    'sharepoint', 'teams', 'onedrive', 'defender', '.net framework',
    'visual studio', 'hyper-v', 'iis', 'sql server', 'active directory',
    'powershell', 'word', 'excel', 'powerpoint', 'onenote', 'access',
    'skype', 'edge',
    'chrome', 'chromium',
    'adobe', 'acrobat', 'reader', 'photoshop', 'illustrator', 'coldfusion',
    'firefox', 'mozilla',
    'zoom',
    'fortinet', 'fortigate', 'forticlient', 'palo alto', 'globalprotect',
    'pulse secure', 'ivanti', 'cisco anyconnect', 'citrix',
    'vmware', 'vCenter', 'esxi',
    'openssl', 'openssh', 'curl', 'libcurl',
    '7-zip', 'winrar', 'putty',
    'oracle java', 'oracle jdk', 'openjdk',
  ];

  async function fetchCVE() {
    const now  = new Date();
    const past = new Date();
    past.setDate(past.getDate() - 30);
    const fmt = d => d.toISOString().slice(0, 19) + '.000';
    const url  = `https://services.nvd.nist.gov/rest/json/cves/2.0?resultsPerPage=200&pubStartDate=${fmt(past)}&pubEndDate=${fmt(now)}`;
    const r = await fetch(url, { signal: AbortSignal.timeout(15000) });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }

  function cveMatchesFilter(cve) {
    const desc = (cve.descriptions?.find(d => d.lang === 'en')?.value || '').toLowerCase();
    if (CVE_KEYWORDS.some(kw => desc.includes(kw.toLowerCase()))) return true;
    const configs = cve.configurations || [];
    for (const cfg of configs) {
      for (const node of (cfg.nodes || [])) {
        for (const match of (node.cpeMatch || [])) {
          const cpe = (match.criteria || '').toLowerCase();
          if (CVE_KEYWORDS.some(kw => cpe.includes(kw.toLowerCase()))) return true;
        }
      }
    }
    return false;
  }

  function cveSeverityInfo(cvssScore) {
    if (cvssScore === null) return { label: 'N/A', barClass: 'sev-none', scoreClass: 'score-none' };
    if (cvssScore >= 9.0)   return { label: cvssScore.toFixed(1), barClass: 'sev-critical', scoreClass: 'score-critical' };
    if (cvssScore >= 7.0)   return { label: cvssScore.toFixed(1), barClass: 'sev-high',     scoreClass: 'score-high' };
    if (cvssScore >= 4.0)   return { label: cvssScore.toFixed(1), barClass: 'sev-medium',   scoreClass: 'score-medium' };
    return                         { label: cvssScore.toFixed(1), barClass: 'sev-low',      scoreClass: 'score-low' };
  }

  function getCvssScore(cve) {
    const m = cve.metrics;
    if (!m) return null;
    const v31 = m.cvssMetricV31?.[0]?.cvssData?.baseScore;
    if (v31 != null) return v31;
    const v30 = m.cvssMetricV30?.[0]?.cvssData?.baseScore;
    if (v30 != null) return v30;
    const v2 = m.cvssMetricV2?.[0]?.cvssData?.baseScore;
    if (v2 != null) return v2;
    return null;
  }

  function getFilteredCVEs(data) {
    return (data.vulnerabilities || [])
      .sort((a, b) => new Date(b.cve.published) - new Date(a.cve.published))
      .filter(({ cve }) => cveMatchesFilter(cve))
      .slice(0, 10);
  }

  // Desktop ticker rendering
  function renderCVETicker(vulns) {
    if (!vulns.length) {
      return '<span class="cve-ticker-loading">NO MATCHING CVEs IN LAST 30 DAYS</span>';
    }

    const items = vulns.map(({ cve }) => {
      const score = getCvssScore(cve);
      const { label, scoreClass } = cveSeverityInfo(score);
      const desc = cve.descriptions?.find(d => d.lang === 'en')?.value || '';
      const shortDesc = desc.length > 90 ? desc.slice(0, 90) + '…' : desc;
      const nvdLink = `https://nvd.nist.gov/vuln/detail/${cve.id}`;

      return `<a class="cve-ticker-item" href="${nvdLink}" target="_blank" rel="noopener">
        <span class="cve-ticker-id">${cve.id}</span>
        <span class="cve-score ${scoreClass}">${label}</span>
        <span class="cve-ticker-desc">${shortDesc}</span>
      </a><span class="cve-ticker-sep">◆</span>`;
    }).join('');

    // Duplicate for seamless loop
    const track = document.getElementById('cve-ticker-track');
    const html = items + items;

    // Compute animation duration after rendering so we can measure width
    // Use a generous fixed estimate: ~500px per item at 80px/s
    const approxWidth = vulns.length * 520;
    const duration = Math.round(approxWidth / 80);
    track.style.setProperty('--ticker-duration', duration + 's');

    return html;
  }

  // Mobile list rendering
  function renderCVE(data) {
    const vulns = getFilteredCVEs(data);

    const itemsHTML = vulns.map(({ cve }) => {
      const score = getCvssScore(cve);
      const { label, barClass, scoreClass } = cveSeverityInfo(score);
      const desc = cve.descriptions?.find(d => d.lang === 'en')?.value || 'No description available.';
      const published = cve.published ? new Date(cve.published).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : '';
      const nvdLink = `https://nvd.nist.gov/vuln/detail/${cve.id}`;

      return `
        <a class="cve-item" href="${nvdLink}" target="_blank" rel="noopener" style="text-decoration:none">
          <div class="cve-severity-bar ${barClass}"></div>
          <div class="cve-body">
            <div class="cve-id">${cve.id}</div>
            <div class="cve-desc">${desc}</div>
            <div class="cve-meta">
              <span class="cve-score ${scoreClass}">${label}</span>
              <span class="cve-date">${published}</span>
            </div>
          </div>
        </a>`;
    }).join('');

    return `
      <div class="section-label">// NVD · TOP 10 RECENT CVEs</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:var(--red-700);letter-spacing:0.12em;margin-bottom:12px;text-transform:uppercase">Microsoft · Chrome · Adobe · Firefox · VPN · VMware &amp; more</div>
      <div class="cve-list">${itemsHTML || '<div class="no-incidents">NO MATCHING CVEs IN LAST 30 DAYS</div>'}</div>`;
  }

  // ── Orchestrate ───────────────────────────────────────────
  async function loadAll() {
    // Reset loaders
    document.getElementById('cve-ticker-track').innerHTML =
      '<span class="cve-ticker-loading">SCANNING NVD CVE FEED...</span>';
    document.getElementById('azure-banner-wrap').innerHTML =
      '<div class="loader"><div class="loader-ring"></div><br>SCANNING AZURE...</div>';
    document.getElementById('samanage-banner-wrap').innerHTML =
      '<div class="loader"><div class="loader-ring"></div><br>SCANNING SAMANAGE...</div>';
    document.getElementById('azure-section').innerHTML = '';
    document.getElementById('samanage-section').innerHTML = '';
    const cveMobileEl = document.getElementById('cve-section');
    if (cveMobileEl) cveMobileEl.innerHTML =
      '<div class="loader"><div class="loader-ring"></div><br>SCANNING NVD CVE FEED...</div>';
    document.getElementById('last-updated').textContent = 'FETCHING DATA...';

    const [samResult, azureResult, cveResult] = await Promise.allSettled([
      fetchSamanage(),
      fetchAzure(),
      fetchCVE()
    ]);

    // Samanage
    if (samResult.status === 'fulfilled') {
      lastSamanageJson = samResult.value;
      const { bannerHTML, section } = renderSamanage(samResult.value);
      document.getElementById('samanage-banner-wrap').innerHTML = bannerHTML;
      document.getElementById('samanage-section').innerHTML = section;
    } else {
      document.getElementById('samanage-banner-wrap').innerHTML = `
        <div class="banner-card warn" onclick="toggleSection('samanage')" role="button" tabindex="0">
          <div class="banner-icon">⚠</div>
          <div class="banner-info">
            <div class="banner-source">Samanage · SolarWinds Service Desk</div>
            <div class="banner-msg">Failed to load status</div>
          </div>
          <span class="banner-badge badge-warn">ERROR</span>
          <span class="toggle-caret">&#9654;</span>
        </div>`;
      document.getElementById('samanage-section').innerHTML =
        `<div class="loader" style="color:var(--red-500)">SAMANAGE DATA UNAVAILABLE</div>`;
    }

    // Azure
    if (azureResult.status === 'fulfilled') {
      lastAzureXml = azureResult.value;
      const { bannerHTML, section } = renderAzure(azureResult.value);
      document.getElementById('azure-banner-wrap').innerHTML = bannerHTML;
      document.getElementById('azure-section').innerHTML = section;
    } else {
      document.getElementById('azure-banner-wrap').innerHTML = `
        <div class="banner-card warn" onclick="toggleSection('azure')" role="button" tabindex="0">
          <div class="banner-icon">⚠</div>
          <div class="banner-info">
            <div class="banner-source">Microsoft Azure</div>
            <div class="banner-msg">Failed to load feed</div>
          </div>
          <span class="banner-badge badge-warn">ERROR</span>
          <span class="toggle-caret">&#9654;</span>
        </div>`;
      document.getElementById('azure-section').innerHTML =
        `<div class="loader" style="color:var(--red-500)">AZURE FEED UNAVAILABLE</div>`;
    }

    // CVE
    if (cveResult.status === 'fulfilled') {
      const vulns = getFilteredCVEs(cveResult.value);
      // Desktop ticker
      const tickerEl = document.getElementById('cve-ticker-track');
      tickerEl.innerHTML = renderCVETicker(vulns);
      // Mobile list
      if (cveMobileEl) cveMobileEl.innerHTML = renderCVE(cveResult.value);
    } else {
      document.getElementById('cve-ticker-track').innerHTML =
        '<span class="cve-ticker-loading">CVE FEED UNAVAILABLE</span>';
      if (cveMobileEl) cveMobileEl.innerHTML =
        `<div class="loader" style="color:var(--red-500)">CVE FEED UNAVAILABLE</div>`;
    }

    document.getElementById('last-updated').textContent =
      'LAST SYNC: ' + new Date().toLocaleString().toUpperCase();
  }

  // ── Countdown timer ───────────────────────────────────────
  const REFRESH_SEC = 600;
  let countdown = REFRESH_SEC;
  let countdownInterval;

  function startCountdown() {
    clearInterval(countdownInterval);
    countdown = REFRESH_SEC;
    document.getElementById('countdown-val').textContent = countdown;
    countdownInterval = setInterval(() => {
      countdown--;
      const el = document.getElementById('countdown-val');
      if (el) el.textContent = countdown < 0 ? 0 : countdown;
    }, 1000);
  }

  const _loadAll = loadAll;
  loadAll = async function () {
    await _loadAll();
    startCountdown();
  };

  loadAll();
  setInterval(() => loadAll(), REFRESH_SEC * 1000);

  // ── Terminal ──────────────────────────────────────────────
  (function initTerminal() {
    const termOutput = document.getElementById('terminal-output');
    const termInput  = document.getElementById('terminal-input');
    const termPanel  = document.getElementById('terminal-panel');
    if (!termOutput || !termInput) return;

    const cmdHistory = [];
    let histIdx = -1;

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function termPrint(text, cls) {
      if (!text && text !== 0) {
        const el = document.createElement('span');
        el.className = 'terminal-line empty';
        termOutput.appendChild(el);
      } else {
        const lines = String(text).split('\n');
        for (const line of lines) {
          const el = document.createElement('span');
          el.className = 'terminal-line ' + (cls || 'out');
          el.textContent = line;
          termOutput.appendChild(el);
        }
      }
      termOutput.scrollTop = termOutput.scrollHeight;
    }

    function termPrintCmd(cmd) {
      const el = document.createElement('span');
      el.className = 'terminal-line cmd';
      el.innerHTML = '<span class="terminal-prompt-prefix">C:\\SYS_STATUS&gt; </span>' + escHtml(cmd);
      termOutput.appendChild(el);
      termOutput.scrollTop = termOutput.scrollHeight;
    }

    function doHelp() {
      termPrint('');
      termPrint('SYS_STATUS // OPERATIONAL GRID', 'header');
      termPrint('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
      termPrint('Live dashboard monitoring Microsoft Azure and Samanage', 'out');
      termPrint('(SolarWinds Service Desk) service statuses, plus a real-', 'out');
      termPrint('time CVE feed pulled from NVD (last 30 days).', 'out');
      termPrint('');
      termPrint('COMMANDS', 'header');
      termPrint('  help                 Show this message', 'out');
      termPrint('  status               Azure + Samanage summary', 'out');
      termPrint('  status -v            Verbose: incidents + full', 'out');
      termPrint('                       component breakdown', 'out');
      termPrint('  cve <CVE-ID>         Look up a CVE by ID', 'out');
      termPrint('                       e.g. cve CVE-2024-12345', 'out');
      termPrint('  clear                Clear terminal output', 'out');
      termPrint('');
    }

    function wrapPrint(text, prefix, cls) {
      const words = String(text).split(' ');
      let line = prefix;
      for (const w of words) {
        if (line.length + w.length > 62) { termPrint(line.trimEnd(), cls); line = prefix + w + ' '; }
        else line += w + ' ';
      }
      if (line.trim()) termPrint(line.trimEnd(), cls);
    }

    function doStatus(verbose) {
      termPrint('');
      termPrint('// SYSTEM STATUS READOUT' + (verbose ? ' [-v]' : ''), 'header');
      termPrint('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');

      // ── Azure ──
      if (lastAzureXml) {
        const items  = Array.from(lastAzureXml.getElementsByTagName('item'));
        const active = items.filter(i => /^active/i.test(
          (i.getElementsByTagName('title')[0]?.textContent || '').trim()
        ));
        if (active.length === 0) {
          termPrint('  [AZURE]     All Systems Normal', 'ok');
        } else {
          termPrint('  [AZURE]     ' + active.length + ' Active Incident' + (active.length > 1 ? 's' : ''), 'warn');
          active.forEach(item => {
            const t = (item.getElementsByTagName('title')[0]?.textContent || '')
              .replace(/^Active\s*[–-]\s*/i, '');
            termPrint('    › ' + t, 'warn');
            if (verbose) {
              const pubDate = item.getElementsByTagName('pubDate')[0]?.textContent || '';
              if (pubDate) termPrint('      Published : ' + new Date(pubDate).toLocaleString(), 'out');
              const rawDesc = item.getElementsByTagName('description')[0]?.textContent || '';
              const desc = stripHtml(rawDesc);
              const snippet = desc.length > 220 ? desc.slice(0, 220).trimEnd() + '…' : desc;
              wrapPrint(snippet, '      ', 'out');
              termPrint('');
            }
          });
        }
        if (verbose) {
          const other = items.filter(i => !/^active/i.test(
            (i.getElementsByTagName('title')[0]?.textContent || '').trim()
          ));
          termPrint('    ' + other.length + ' non-active item' + (other.length !== 1 ? 's' : '') + ' in feed', 'out');
        }
      } else {
        termPrint('  [AZURE]     Data not yet loaded', 'err');
      }

      termPrint('');

      // ── Samanage ──
      if (lastSamanageJson) {
        const ind  = lastSamanageJson.status.indicator;
        const desc = lastSamanageJson.status.description;
        const isOk = ind === 'none';
        termPrint('  [SAMANAGE]  ' + (isOk ? 'All Systems Operational' : desc), isOk ? 'ok' : 'warn');

        if (verbose) {
          const components = lastSamanageJson.components || [];
          const groups     = components.filter(c => c.group === true);
          const children   = components.filter(c => c.group === false && c.group_id);
          const standalone = components.filter(c => c.group === false && !c.group_id);

          const targetStandalone = ['Website & Blog'];
          const targetGroups = [
            'SolarWinds Service Desk [USA]',
            'SolarWinds Service Desk [EMEA]',
            'SolarWinds Service Desk [APAC]',
            'Mobile Application'
          ];

          termPrint('');
          for (const name of targetStandalone) {
            const c = standalone.find(x => x.name === name);
            if (!c) continue;
            const ok = c.status === 'operational';
            termPrint('    ● ' + c.name + '  ' + fmtStatus(c.status), ok ? 'ok' : 'warn');
          }
          for (const name of targetGroups) {
            const g = groups.find(x => x.name === name);
            if (!g) continue;
            const gOk = g.status === 'operational';
            termPrint('    ┌ ' + g.name + '  [' + fmtStatus(g.status) + ']', gOk ? 'ok' : 'warn');
            const kids = children.filter(x => x.group_id === g.id);
            kids.forEach((k, idx) => {
              const isLast = idx === kids.length - 1;
              const kOk = k.status === 'operational';
              termPrint('    ' + (isLast ? '└' : '├') + ' ' + k.name + ': ' + fmtStatus(k.status), kOk ? 'ok' : 'warn');
            });
            termPrint('');
          }
        } else if (!isOk) {
          const nonOp = (lastSamanageJson.components || [])
            .filter(c => c.status !== 'operational' && !c.group);
          nonOp.slice(0, 6).forEach(c => {
            termPrint('    › ' + c.name + ': ' + c.status.replace(/_/g,' '), 'warn');
          });
        }
      } else {
        termPrint('  [SAMANAGE]  Data not yet loaded', 'err');
      }

      termPrint('');
      termPrint('  ' + (document.getElementById('last-updated')?.textContent || 'N/A'), 'out');
      termPrint('');
    }

    async function doCve(rawId) {
      if (!rawId) {
        termPrint('  Usage: cve <CVE-ID>   e.g. cve CVE-2024-12345', 'err');
        return;
      }
      if (!/^CVE-\d{4}-\d+$/i.test(rawId)) {
        termPrint('  Invalid format: ' + rawId, 'err');
        termPrint('  Expected: CVE-YYYY-NNNNN', 'err');
        return;
      }
      const id = rawId.toUpperCase();
      termPrint('  Querying NVD for ' + id + '...', 'info');
      try {
        const url = 'https://services.nvd.nist.gov/rest/json/cves/2.0?cveId=' + id;
        const r = await fetch(url, { signal: AbortSignal.timeout(12000) });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        const vuln = data.vulnerabilities?.[0]?.cve;
        if (!vuln) {
          termPrint('  No record found for ' + id, 'err');
          return;
        }

        const score   = getCvssScore(vuln);
        const sevInfo = cveSeverityInfo(score);
        const published = vuln.published
          ? new Date(vuln.published).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' })
          : 'Unknown';
        const desc = vuln.descriptions?.find(d => d.lang === 'en')?.value || 'No description.';
        const scoreColor = score === null ? 'out' : score >= 9 ? 'err' : score >= 7 ? 'warn' : score >= 4 ? 'warn' : 'ok';

        termPrint('');
        termPrint('  ' + vuln.id, 'info');
        termPrint('  ─────────────────────────────────────', 'out');
        termPrint('  CVSS Score : ' + sevInfo.label, scoreColor);
        termPrint('  Published  : ' + published, 'out');
        termPrint('');

        // Word-wrap description at ~62 chars
        const words = desc.split(' ');
        let line = '  ';
        for (const w of words) {
          if (line.length + w.length > 62) {
            termPrint(line, 'out');
            line = '  ' + w + ' ';
          } else {
            line += w + ' ';
          }
        }
        if (line.trim()) termPrint(line.trimEnd(), 'out');

        termPrint('');
        termPrint('  https://nvd.nist.gov/vuln/detail/' + vuln.id, 'info');
        termPrint('');
      } catch (e) {
        termPrint('  Error: ' + e.message, 'err');
      }
    }

    async function handleCommand(raw) {
      const cmd   = raw.trim();
      if (!cmd) return;
      cmdHistory.unshift(cmd);
      histIdx = -1;
      termPrintCmd(cmd);

      const parts = cmd.split(/\s+/);
      const verb  = parts[0].toLowerCase();

      if (verb === 'clear' || verb === 'cls') { termOutput.innerHTML = ''; return; }
      if (verb === 'help')   { doHelp();                                           return; }
      if (verb === 'status') { doStatus(parts[1] === '-v' || parts[1] === '--verbose'); return; }
      if (verb === 'cve')    { await doCve(parts[1]);                              return; }

      termPrint("  '" + cmd + "': unknown command. Type 'help' for available commands.", 'err');
    }

    termInput.addEventListener('keydown', async e => {
      if (e.key === 'Enter') {
        const val = termInput.value;
        termInput.value = '';
        await handleCommand(val);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (histIdx < cmdHistory.length - 1) {
          histIdx++;
          termInput.value = cmdHistory[histIdx];
        }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (histIdx > 0) {
          histIdx--;
          termInput.value = cmdHistory[histIdx];
        } else {
          histIdx = -1;
          termInput.value = '';
        }
      }
    });

    termPanel.addEventListener('click', () => termInput.focus());

    // Boot sequence
    const bootLines = [
      { t: 'SYS_STATUS TERMINAL v1.0',                   c: 'info' },
      { t: '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━',   c: 'out'  },
      { t: 'Microsoft Azure & Samanage status monitor.',  c: 'out'  },
      { t: 'Data refreshes every 10 minutes.',            c: 'out'  },
      { t: '',                                             c: ''     },
      { t: 'Available commands:',                         c: 'out'  },
      { t: '  help       — About this dashboard',         c: 'out'  },
      { t: '  status     — Azure + Samanage summary',     c: 'out'  },
      { t: '  status -v  — Full verbose breakdown',       c: 'out'  },
      { t: '  cve        — Lookup a CVE by ID',           c: 'out'  },
      { t: '',                                             c: ''     },
    ];

    let bi = 0;
    function bootNext() {
      if (bi >= bootLines.length) { if (window.innerWidth > 900) termInput.focus(); return; }
      const { t, c } = bootLines[bi++];
      termPrint(t || undefined, c || undefined);
      setTimeout(bootNext, 60);
    }
    bootNext();
  })();
</script>
